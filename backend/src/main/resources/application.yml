spring:
  application:
    name: map-starterkit
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  web:
    cors:
      allowed-origins: http://localhost:3000
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allow-credentials: true
      max-age: 3600

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    org.springframework.web: INFO
    org.hibernate: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
