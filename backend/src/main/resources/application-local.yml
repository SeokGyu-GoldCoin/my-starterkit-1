spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/map_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.spatial.dialect.postgresql.PostgisDialect
